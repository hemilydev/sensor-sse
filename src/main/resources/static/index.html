<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Sensores SSE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #status {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background-color: #fff;
            border-radius: 10px;
            padding: 25px;
            width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h2 {
            margin: 0 0 10px;
            color: #555;
            text-transform: capitalize;
        }
        .card .temperatura {
            font-size: 36px;
            font-weight: bold;
            color: #e74c3c;
        }
        .card .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Monitor de Sensores de Temperatura</h1>
    <div id="status">Conectando...</div>
    <div class="cards">
        <div class="card" id="card-sala">
            <h2>Sala</h2>
            <div class="temperatura">--</div>
            <div class="timestamp">--</div>
        </div>
        <div class="card" id="card-server">
            <h2>Server</h2>
            <div class="temperatura">--</div>
            <div class="timestamp">--</div>
        </div>
        <div class="card" id="card-externo">
            <h2>Externo</h2>
            <div class="temperatura">--</div>
            <div class="timestamp">--</div>
        </div>
    </div>

    <script>
        const status = document.getElementById('status');
        const source = new EventSource('http://localhost:8080/sensores/stream');

        source.onopen = () => {
            status.style.color = 'green';
            status.textContent = 'Conectado';
        };

        source.addEventListener('temperatura', (event) => {
            const dados = JSON.parse(event.data);
            const card = document.getElementById('card-' + dados.sensor);
            if (card) {
                card.querySelector('.temperatura').textContent =
                    dados.valor.toFixed(1) + ' °C';
                card.querySelector('.timestamp').textContent =
                    'Atualizado: ' + new Date(dados.timestamp).toLocaleTimeString('pt-BR');
            }
        });

        source.onerror = () => {
            if (source.readyState === EventSource.CLOSED) {
                status.style.color = 'red';
                status.textContent = 'Conexão encerrada';
            } else {
                status.style.color = 'orange';
                status.textContent = 'Reconectando...';
            }
        };
    </script>
</body>
</html>
